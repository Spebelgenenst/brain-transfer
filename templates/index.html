<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Transfer</title>
    <link rel="icon" href="./static/favicon.ico">
</head>
<style>
    .error {
        color: red;
    }
</style>
<body>
    {% if error is not none %}
        <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post" action="/download" enctype="multipart/form-data">
        {{ file.csrf_token }}
        <p>transfer_type: {{ file.transfer_type }}</p>
        <p>{{ file.download }} direct download (select if you have any issues)</p>
        <p>file: {{ file.file }}</p>
        captcha: {{ captcha_html(captcha)|safe }}
        <button type="submit" class="button">submit</button>
    </form>
</body>
</html>
